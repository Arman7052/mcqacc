<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenario Exam – ICAEW Accounting Ch 12 & 13</title>
  <meta name="description" content="Full scenario-based ICAEW Accounting exam with complete company data, trial balances and adjustments displayed alongside questions." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d1b2e;
      --blue: #1d4ed8;
      --blue-light: #3b82f6;
      --gold: #d4a017;
      --gold-light: #f4c842;
      --cream: #fdfaf4;
      --gray: #6b7280;
      --border: #e5e7eb;
      --green: #16a34a;
      --red: #dc2626;
      --teal: #0d9488;
      --teal-light: #14b8a6;
      --purple: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: #111827; min-height: 100vh; }

    /* ── HEADER ─── */
    .exam-header {
      background: var(--navy); padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; height: 64px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn {
      color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .back-btn:hover { color: white; }
    .exam-title { color: white; font-weight: 600; font-size: 15px; }
    .exam-title span { color: var(--gold-light); }
    .timer-block { display: flex; align-items: center; gap: 10px; }
    .timer {
      font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700;
      color: white; letter-spacing: 2px; min-width: 90px; text-align: center;
    }
    .timer.warning { color: #fbbf24; animation: pulse 1s infinite; }
    .timer.danger  { color: #f87171; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
    .timer-label { color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

    /* ── PROGRESS ─── */
    .progress-section { background: white; border-bottom: 1px solid var(--border); padding: 12px 24px; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--gray); }
    .progress-bar-outer { background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-bar-inner {
      background: linear-gradient(90deg, var(--teal), var(--teal-light));
      height: 100%; border-radius: 99px; transition: width 0.3s ease;
    }

    /* ── MAIN LAYOUT ─── */
    .main-layout {
      display: grid; grid-template-columns: 380px 1fr;
      gap: 0; min-height: calc(100vh - 64px - 44px);
    }

    /* ── LEFT PANEL: Company Scenario ─── */
    .scenario-panel {
      background: #f0f4ff; border-right: 2px solid #c7d7fc;
      overflow-y: auto; padding: 0;
      position: sticky; top: 108px; height: calc(100vh - 108px);
    }
    .scenario-header {
      background: linear-gradient(135deg, var(--navy), #1a3a6b);
      padding: 20px; color: white;
    }
    .scenario-chapter-badge {
      display: inline-block; background: rgba(212,160,23,0.2);
      border: 1px solid rgba(212,160,23,0.4); color: var(--gold-light);
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .scenario-company-name {
      font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700;
      color: white; line-height: 1.2;
    }
    .scenario-year-end { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .scenario-intro { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 10px; line-height: 1.5; }

    .scenario-body { padding: 16px; }

    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      color: var(--blue); margin: 16px 0 8px; display: flex; align-items: center; gap: 6px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--blue); opacity: 0.2; }

    /* Trial Balance Table */
    .tb-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .tb-table th {
      background: var(--navy); color: white; padding: 6px 8px; text-align: left; font-size: 11px;
    }
    .tb-table th:nth-child(2), .tb-table th:nth-child(3) { text-align: right; }
    .tb-table td { padding: 5px 8px; border-bottom: 1px solid #e0e7ff; color: #1e293b; }
    .tb-table td:nth-child(2), .tb-table td:nth-child(3) { text-align: right; font-family: monospace; }
    .tb-table tr:nth-child(even) td { background: rgba(59,130,246,0.04); }
    .tb-table tfoot td { font-weight: 700; border-top: 2px solid var(--navy); background: #f8faff; font-family: monospace; }
    .tb-table tfoot td:first-child { font-weight: 700; }

    /* SFP Comparison */
    .sfp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .sfp-table th { background: #1e3a5f; color: white; padding: 5px 8px; text-align: right; font-size: 11px; }
    .sfp-table th:first-child { text-align: left; }
    .sfp-table td { padding: 4px 8px; border-bottom: 1px solid #e0e7ff; font-size: 12px; }
    .sfp-table td:nth-child(2), .sfp-table td:nth-child(3) { text-align: right; font-family: monospace; color: #1e3a5f; }

    /* Adjustments */
    .adj-list { display: flex; flex-direction: column; gap: 8px; }
    .adj-item {
      background: white; border: 1px solid #dbeafe; border-left: 3px solid var(--blue);
      border-radius: 6px; padding: 10px 12px;
    }
    .adj-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; background: var(--blue); color: white;
      border-radius: 50%; font-size: 11px; font-weight: 700; flex-shrink: 0;
      float: left; margin-right: 8px; margin-top: 1px;
    }
    .adj-text { font-size: 12px; color: #1e293b; line-height: 1.5; white-space: pre-line; }

    /* ── RIGHT PANEL: Questions ─── */
    .questions-panel { padding: 24px; overflow-y: auto; }

    .company-nav {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .company-nav-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1.5px solid var(--border); background: white; cursor: pointer;
      transition: all 0.2s; color: var(--gray);
    }
    .company-nav-btn:hover { border-color: var(--blue); color: var(--blue); }
    .company-nav-btn.active { background: var(--navy); border-color: var(--navy); color: white; }
    .company-nav-btn.done { border-color: var(--green); color: var(--green); }

    /* Chapter selector */
    .chapter-tabs { display: flex; gap: 0; margin-bottom: 16px; }
    .ch-tab {
      flex: 1; padding: 10px; text-align: center; border: 1.5px solid var(--border);
      background: white; cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all 0.2s; color: var(--gray);
    }
    .ch-tab:first-child { border-radius: 8px 0 0 8px; }
    .ch-tab:last-child { border-radius: 0 8px 8px 0; }
    .ch-tab.active { background: var(--navy); border-color: var(--navy); color: white; }

    /* Questions */
    .questions-heading {
      font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700;
      color: var(--navy); margin-bottom: 4px;
    }
    .questions-sub { font-size: 13px; color: var(--gray); margin-bottom: 20px; }

    .q-card {
      background: white; border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 16px; transition: box-shadow 0.2s;
    }
    .q-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .q-number {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      color: var(--teal); margin-bottom: 8px;
    }
    .q-text { font-size: 15px; font-weight: 500; color: #111827; line-height: 1.5; margin-bottom: 14px; }

    .adj-refs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .adj-ref-tag {
      font-size: 11px; background: #eff6ff; color: var(--blue);
      border: 1px solid #bfdbfe; padding: 2px 8px; border-radius: 12px;
    }

    .options { display: flex; flex-direction: column; gap: 8px; }
    .option-btn {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: 8px; background: white;
      cursor: pointer; text-align: left; font-size: 14px; color: #374151;
      transition: all 0.15s; width: 100%;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--blue-light); background: #eff6ff; }
    .option-letter {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; flex-shrink: 0; transition: all 0.15s;
    }
    .option-btn.correct { border-color: var(--green); background: #f0fdf4; }
    .option-btn.correct .option-letter { background: var(--green); border-color: var(--green); color: white; }
    .option-btn.wrong { border-color: var(--red); background: #fef2f2; }
    .option-btn.wrong .option-letter { background: var(--red); border-color: var(--red); color: white; }

    .explanation {
      margin-top: 14px; background: #f8faff; border: 1px solid #dbeafe;
      border-left: 4px solid var(--blue); border-radius: 8px;
      padding: 12px 16px; font-size: 13px; color: #1e3a5f; line-height: 1.6;
      white-space: pre-line; display: none;
    }
    .explanation.show { display: block; }

    /* ── RESULTS ─── */
    .results-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; align-items: center; justify-content: center;
    }
    .results-overlay.show { display: flex; }
    .results-card {
      background: white; border-radius: 20px; padding: 40px; max-width: 500px;
      width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .results-icon { font-size: 64px; margin-bottom: 16px; }
    .results-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .results-score { font-size: 56px; font-weight: 700; color: var(--teal); margin: 16px 0; }
    .results-label { font-size: 14px; color: var(--gray); margin-bottom: 24px; }
    .results-breakdown { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
    .breakdown-item { text-align: center; }
    .breakdown-val { font-size: 24px; font-weight: 700; }
    .breakdown-val.correct { color: var(--green); }
    .breakdown-val.wrong   { color: var(--red); }
    .breakdown-sub { font-size: 12px; color: var(--gray); }
    .results-btn {
      padding: 14px 32px; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .results-btn.primary { background: var(--navy); color: white; margin-right: 12px; }
    .results-btn.primary:hover { background: #1a2f50; }
    .results-btn.secondary { background: #f3f4f6; color: var(--navy); }
    .results-btn.secondary:hover { background: #e5e7eb; }

    /* ── BOTTOM NAV ─── */
    .bottom-nav {
      background: white; border-top: 1px solid var(--border);
      padding: 10px 24px; display: flex; justify-content: space-between; align-items: center;
    }
    .nav-btn {
      padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: 1.5px solid var(--border); background: white;
      transition: all 0.2s; display: flex; align-items: center; gap: 8px;
    }
    .nav-btn:hover { border-color: var(--navy); color: var(--navy); }
    .nav-btn.primary { background: var(--navy); border-color: var(--navy); color: white; }
    .nav-btn.primary:hover { background: #1a2f50; }
    .nav-btn:disabled { opacity: 0.4; cursor: default; }

    /* Responsive */
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
      .scenario-panel { position: relative; top: 0; height: auto; max-height: 400px; }
    }
    @media (max-width: 600px) {
      .exam-header { padding: 0 12px; }
      .questions-panel { padding: 12px; }
    }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 16px; padding: 12px 24px; background: white;
      border-bottom: 1px solid var(--border); font-size: 13px; flex-wrap: wrap;
    }
    .stat-item { display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
    .stat-dot.answered { background: var(--teal); }
    .stat-dot.correct  { background: var(--green); }
    .stat-dot.wrong    { background: var(--red); }
    .stat-dot.unanswered { background: var(--border); border: 1px solid var(--gray); }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="exam-header">
  <div class="header-left">
    <a href="index.html" class="back-btn">← Home</a>
    <div class="exam-title">ICAEW <span>Scenario Exam</span> – Ch 12 &amp; 13</div>
  </div>
  <div class="timer-block">
    <div>
      <div class="timer-label">Time</div>
      <div class="timer" id="timer">90:00</div>
    </div>
  </div>
</header>

<!-- PROGRESS -->
<div class="progress-section">
  <div class="progress-info">
    <span id="progressText">Question 0 of 0</span>
    <span id="scoreText">Score: 0 / 0</span>
  </div>
  <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-dot correct"></div><span id="statCorrect">0 Correct</span></div>
  <div class="stat-item"><div class="stat-dot wrong"></div><span id="statWrong">0 Wrong</span></div>
  <div class="stat-item"><div class="stat-dot unanswered"></div><span id="statUnanswered">0 Remaining</span></div>
</div>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- LEFT: Scenario Panel -->
  <aside class="scenario-panel" id="scenarioPanel">
    <div class="scenario-header">
      <div class="scenario-chapter-badge" id="scenarioBadge">Chapter 12</div>
      <div class="scenario-company-name" id="scenarioName">Loading…</div>
      <div class="scenario-year-end" id="scenarioYearEnd"></div>
      <div class="scenario-intro" id="scenarioIntro"></div>
    </div>
    <div class="scenario-body">
      <div id="tbSection"></div>
      <div id="adjSection"></div>
    </div>
  </aside>

  <!-- RIGHT: Questions -->
  <main class="questions-panel">
    <!-- Chapter Tabs -->
    <div class="chapter-tabs">
      <button class="ch-tab active" id="tab12" onclick="selectChapter(12)">Chapter 12 – Financial Statements</button>
      <button class="ch-tab" id="tab13" onclick="selectChapter(13)">Chapter 13 – Cash Flows</button>
    </div>

    <!-- Company Nav -->
    <div class="company-nav" id="companyNav"></div>

    <!-- Questions heading -->
    <div class="questions-heading" id="questionsHeading">Questions</div>
    <div class="questions-sub" id="questionsSub">Select a company to begin</div>

    <!-- Question cards -->
    <div id="questionCards"></div>
  </main>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn" id="prevCompanyBtn" onclick="prevCompany()" disabled>← Previous Company</button>
  <button class="nav-btn primary" id="submitBtn" onclick="showResults()">Submit Exam</button>
  <button class="nav-btn" id="nextCompanyBtn" onclick="nextCompany()">Next Company →</button>
</div>

<!-- RESULTS -->
<div class="results-overlay" id="resultsOverlay">
  <div class="results-card">
    <div class="results-icon" id="resultsIcon">🎯</div>
    <div class="results-title">Exam Complete</div>
    <div class="results-score" id="resultsScore">0%</div>
    <div class="results-label" id="resultsLabel">You answered 0 of 0 questions correctly</div>
    <div class="results-breakdown">
      <div class="breakdown-item"><div class="breakdown-val correct" id="bCorrect">0</div><div class="breakdown-sub">Correct</div></div>
      <div class="breakdown-item"><div class="breakdown-val wrong" id="bWrong">0</div><div class="breakdown-sub">Wrong</div></div>
      <div class="breakdown-item"><div class="breakdown-val" id="bSkipped" style="color:var(--gray)">0</div><div class="breakdown-sub">Skipped</div></div>
    </div>
    <button class="results-btn primary" onclick="reviewAnswers()">Review Answers</button>
    <button class="results-btn secondary" onclick="restartExam()">Restart</button>
  </div>
</div>

<script src="scenario-questions.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let currentChapter = 12;
let currentCompanyIdx = 0;
let answers = {};          // key: "chap-compIdx-qIdx" → chosen option index
let timerInterval = null;
let totalSeconds = 90 * 60;
let examSubmitted = false;

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  startTimer();
  selectChapter(12);
});

// ═══════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════
function startTimer() {
  const el = document.getElementById('timer');
  timerInterval = setInterval(() => {
    if (examSubmitted) { clearInterval(timerInterval); return; }
    totalSeconds--;
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className = 'timer' + (totalSeconds < 600 ? ' warning' : '') + (totalSeconds < 120 ? ' danger' : '');
    if (totalSeconds <= 0) { clearInterval(timerInterval); showResults(); }
  }, 1000);
}

// ═══════════════════════════════════════════════════════════
//  CHAPTER SELECTION
// ═══════════════════════════════════════════════════════════
function selectChapter(ch) {
  currentChapter = ch;
  currentCompanyIdx = 0;
  document.getElementById('tab12').classList.toggle('active', ch === 12);
  document.getElementById('tab13').classList.toggle('active', ch === 13);
  renderCompanyNav();
  renderCompany(currentCompanyIdx);
}

// ═══════════════════════════════════════════════════════════
//  COMPANY NAV
// ═══════════════════════════════════════════════════════════
function renderCompanyNav() {
  const companies = scenarioBank[currentChapter].companies;
  const nav = document.getElementById('companyNav');
  nav.innerHTML = '';
  companies.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'company-nav-btn' + (i === currentCompanyIdx ? ' active' : '');
    btn.textContent = c.name;
    // Check if all questions answered
    const allDone = c.questions.every((_, qi) => answers[`${currentChapter}-${i}-${qi}`] !== undefined);
    if (allDone) btn.classList.add('done');
    btn.onclick = () => { currentCompanyIdx = i; renderCompany(i); renderCompanyNav(); };
    nav.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════
//  RENDER COMPANY (scenario panel + questions)
// ═══════════════════════════════════════════════════════════
function renderCompany(idx) {
  const company = scenarioBank[currentChapter].companies[idx];

  // — Scenario panel header —
  document.getElementById('scenarioBadge').textContent = `Chapter ${company.chapter}`;
  document.getElementById('scenarioName').textContent = company.name;
  document.getElementById('scenarioYearEnd').textContent = company.year_end ? `Year end: ${company.year_end}` : '';
  document.getElementById('scenarioIntro').textContent = company.intro || '';

  // — Trial Balance —
  const tbSec = document.getElementById('tbSection');
  if (company.trial_balance && company.trial_balance.length > 0) {
    let tbHtml = `<div class="section-label">Trial Balance / Financial Data</div>`;
    tbHtml += `<table class="tb-table">
      <thead><tr><th>Account</th><th>Dr £</th><th>Cr £</th></tr></thead>
      <tbody>`;
    let totalDr = 0, totalCr = 0;
    company.trial_balance.forEach(row => {
      const dr = row.debit ? row.debit.toLocaleString() : '';
      const cr = row.credit ? row.credit.toLocaleString() : '';
      if (row.debit) totalDr += row.debit;
      if (row.credit) totalCr += row.credit;
      tbHtml += `<tr><td>${row.account}</td><td>${dr}</td><td>${cr}</td></tr>`;
    });
    tbHtml += `</tbody>`;
    if (totalDr > 0) {
      tbHtml += `<tfoot><tr><td>TOTAL</td><td>${totalDr.toLocaleString()}</td><td>${totalCr.toLocaleString()}</td></tr></tfoot>`;
    }
    tbHtml += `</table>`;
    tbSec.innerHTML = tbHtml;
  } else if (company.sfp_data && company.sfp_data.length > 0) {
    // SFP comparison table
    let sfpHtml = `<div class="section-label">Statements of Financial Position</div>`;
    sfpHtml += `<table class="sfp-table">
      <thead><tr><th>Item</th><th>Current Year £</th><th>Prior Year £</th></tr></thead>
      <tbody>`;
    company.sfp_data.forEach(row => {
      sfpHtml += `<tr><td>${row.item}</td><td>${row.y2.toLocaleString()}</td><td>${row.y1.toLocaleString()}</td></tr>`;
    });
    sfpHtml += `</tbody></table>`;
    tbSec.innerHTML = sfpHtml;
  } else {
    tbSec.innerHTML = '';
  }

  // If company has both tb AND sfp_data
  if (company.sfp_data && company.sfp_data.length > 0 && company.trial_balance && company.trial_balance.length > 0) {
    let sfpHtml = `<div class="section-label">Statements of Financial Position</div>`;
    sfpHtml += `<table class="sfp-table">
      <thead><tr><th>Item</th><th>Current £</th><th>Prior £</th></tr></thead><tbody>`;
    company.sfp_data.forEach(row => {
      sfpHtml += `<tr><td>${row.item}</td><td>${row.y2.toLocaleString()}</td><td>${row.y1.toLocaleString()}</td></tr>`;
    });
    sfpHtml += `</tbody></table>`;
    tbSec.innerHTML += sfpHtml;
  }

  // — Adjustments —
  const adjSec = document.getElementById('adjSection');
  if (company.adjustments && company.adjustments.length > 0) {
    let adjHtml = `<div class="section-label">Adjustments &amp; Additional Information</div><div class="adj-list">`;
    company.adjustments.forEach(adj => {
      adjHtml += `<div class="adj-item">
        <span class="adj-num">${adj.number}</span>
        <div class="adj-text">${escapeHtml(adj.text)}${adj.detail ? '\n' + escapeHtml(adj.detail) : ''}</div>
      </div>`;
    });
    adjHtml += `</div>`;
    adjSec.innerHTML = adjHtml;
  } else {
    adjSec.innerHTML = '';
  }

  // — Questions heading —
  document.getElementById('questionsHeading').textContent = company.name + ' – Questions';
  document.getElementById('questionsSub').textContent =
    `${company.questions.length} question${company.questions.length !== 1 ? 's' : ''} · Use the scenario panel on the left for reference`;

  // — Render question cards —
  renderQuestions(company, idx);

  // Update nav state
  updateNavButtons();
  updateStats();
}

// ═══════════════════════════════════════════════════════════
//  RENDER QUESTIONS
// ═══════════════════════════════════════════════════════════
function renderQuestions(company, compIdx) {
  const container = document.getElementById('questionCards');
  container.innerHTML = '';

  company.questions.forEach((q, qi) => {
    const key = `${currentChapter}-${compIdx}-${qi}`;
    const chosen = answers[key];
    const revealed = examSubmitted || chosen !== undefined;

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `qcard-${qi}`;

    // Adjustment references
    let adjRefs = '';
    if (q.adj_ref && q.adj_ref.length > 0) {
      adjRefs = `<div class="adj-refs">` +
        q.adj_ref.map(n => `<span class="adj-ref-tag">Adjustment ${n}</span>`).join('') +
        `</div>`;
    }

    // Options HTML
    let optionsHtml = '<div class="options">';
    const letters = ['A','B','C','D'];
    q.options.forEach((opt, oi) => {
      let cls = 'option-btn';
      if (revealed) {
        if (oi === q.answer) cls += ' correct';
        else if (chosen === oi && oi !== q.answer) cls += ' wrong';
      }
      optionsHtml += `<button class="${cls}" onclick="selectAnswer('${key}',${oi},${q.answer},${qi})"
        ${revealed ? 'disabled' : ''}>
        <span class="option-letter">${letters[oi]}</span>
        <span>${escapeHtml(opt)}</span>
      </button>`;
    });
    optionsHtml += '</div>';

    const expStyle = revealed ? ' show' : '';
    card.innerHTML = `
      <div class="q-number">Q${qi + 1} of ${company.questions.length}</div>
      <div class="q-text">${escapeHtml(q.q)}</div>
      ${adjRefs}
      ${optionsHtml}
      <div class="explanation${expStyle}"><strong>📖 Explanation:</strong><br>${escapeHtml(q.explanation)}</div>
    `;
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
//  SELECT ANSWER
// ═══════════════════════════════════════════════════════════
function selectAnswer(key, chosen, correct, qi) {
  if (answers[key] !== undefined || examSubmitted) return;
  answers[key] = chosen;

  // Update this card visually
  const card = document.getElementById(`qcard-${qi}`);
  const btns = card.querySelectorAll('.option-btn');
  btns.forEach((btn, oi) => {
    btn.disabled = true;
    if (oi === correct) btn.classList.add('correct');
    else if (oi === chosen && oi !== correct) btn.classList.add('wrong');
  });
  card.querySelector('.explanation').classList.add('show');

  updateStats();
  updateProgress();
  renderCompanyNav();
}

// ═══════════════════════════════════════════════════════════
//  STATS & PROGRESS
// ═══════════════════════════════════════════════════════════
function getAllQuestions() {
  const all = [];
  for (const [ch, chData] of Object.entries(scenarioBank)) {
    chData.companies.forEach((c, ci) => {
      c.questions.forEach((q, qi) => {
        all.push({ ch: parseInt(ch), ci, qi, q });
      });
    });
  }
  return all;
}

function updateStats() {
  const all = getAllQuestions();
  let correct = 0, wrong = 0, answered = 0;
  all.forEach(({ ch, ci, qi, q }) => {
    const key = `${ch}-${ci}-${qi}`;
    if (answers[key] !== undefined) {
      answered++;
      if (answers[key] === q.answer) correct++; else wrong++;
    }
  });
  document.getElementById('statCorrect').textContent = correct + ' Correct';
  document.getElementById('statWrong').textContent = wrong + ' Wrong';
  document.getElementById('statUnanswered').textContent = (all.length - answered) + ' Remaining';
}

function updateProgress() {
  const all = getAllQuestions();
  const answered = all.filter(({ ch, ci, qi }) => answers[`${ch}-${ci}-${qi}`] !== undefined).length;
  const pct = all.length ? Math.round(answered / all.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} of ${all.length} answered`;
  const correct = all.filter(({ ch, ci, qi, q }) => answers[`${ch}-${ci}-${qi}`] === q.answer).length;
  document.getElementById('scoreText').textContent = `Score: ${correct} / ${answered}`;
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
function prevCompany() {
  const companies = scenarioBank[currentChapter].companies;
  if (currentCompanyIdx > 0) {
    currentCompanyIdx--;
    renderCompany(currentCompanyIdx);
    renderCompanyNav();
  } else if (currentChapter === 13) {
    selectChapter(12);
    currentCompanyIdx = scenarioBank[12].companies.length - 1;
    renderCompany(currentCompanyIdx);
    renderCompanyNav();
  }
}

function nextCompany() {
  const companies = scenarioBank[currentChapter].companies;
  if (currentCompanyIdx < companies.length - 1) {
    currentCompanyIdx++;
    renderCompany(currentCompanyIdx);
    renderCompanyNav();
  } else if (currentChapter === 12) {
    selectChapter(13);
    currentCompanyIdx = 0;
    renderCompany(0);
    renderCompanyNav();
  }
}

function updateNavButtons() {
  const companies = scenarioBank[currentChapter].companies;
  const isFirst = currentChapter === 12 && currentCompanyIdx === 0;
  const isLast  = currentChapter === 13 && currentCompanyIdx === companies.length - 1;
  document.getElementById('prevCompanyBtn').disabled = isFirst;
  document.getElementById('nextCompanyBtn').disabled = isLast;
}

// ═══════════════════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════════════════
function showResults() {
  examSubmitted = true;
  clearInterval(timerInterval);
  const all = getAllQuestions();
  let correct = 0, wrong = 0, skipped = 0;
  all.forEach(({ ch, ci, qi, q }) => {
    const key = `${ch}-${ci}-${qi}`;
    if (answers[key] === undefined) skipped++;
    else if (answers[key] === q.answer) correct++;
    else wrong++;
  });
  const pct = Math.round(correct / all.length * 100);

  document.getElementById('resultsIcon').textContent = pct >= 70 ? '🏆' : pct >= 50 ? '📚' : '💪';
  document.getElementById('resultsScore').textContent = pct + '%';
  document.getElementById('resultsLabel').textContent = `You answered ${correct} of ${all.length} questions correctly`;
  document.getElementById('bCorrect').textContent = correct;
  document.getElementById('bWrong').textContent = wrong;
  document.getElementById('bSkipped').textContent = skipped;
  document.getElementById('resultsOverlay').classList.add('show');
}

function reviewAnswers() {
  document.getElementById('resultsOverlay').classList.remove('show');
  // Re-render current company with all answers revealed
  renderCompany(currentCompanyIdx);
}

function restartExam() {
  answers = {};
  examSubmitted = false;
  totalSeconds = 90 * 60;
  document.getElementById('resultsOverlay').classList.remove('show');
  clearInterval(timerInterval);
  startTimer();
  selectChapter(12);
  updateProgress();
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g, '<br>');
}
</script>
